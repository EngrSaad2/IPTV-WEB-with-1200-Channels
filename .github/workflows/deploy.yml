name: Deploy Website

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Server Webhook
        env:
          WEBHOOK_SECRET: ${{ secrets.GITHUB_WEBHOOK_SECRET }}
        run: |
          if [ -z "$WEBHOOK_SECRET" ]; then
            echo "Error: GITHUB_WEBHOOK_SECRET secret is not configured in GitHub repository secrets."
            exit 1
          fi
          
          # Construct payload
          PAYLOAD='{"ref":"refs/heads/main","sha":"'"$GITHUB_SHA"'"}'
          
          # Calculate signature using Node.js
          SIGNATURE=$(node -e "
            const crypto = require('crypto');
            const hmac = crypto.createHmac('sha256', process.env.WEBHOOK_SECRET);
            hmac.update(process.argv[1]);
            console.log(hmac.digest('hex'));
          " "$PAYLOAD")
          
          echo "Triggering deployment webhook..."
          
          # Perform the POST request and capture output/http code
          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X POST \
            -H "Content-Type: application/json" \
            -H "X-Hub-Signature-256: sha256=$SIGNATURE" \
            -d "$PAYLOAD" \
            https://tv.triangletech.com.bd/deploy-webhook.php)
            
          HTTP_STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS" | cut -d':' -f2)
          BODY=$(echo "$RESPONSE" | grep -v "HTTP_STATUS")
          
          echo "=================================="
          echo "Webhook Response (HTTP Status: $HTTP_STATUS):"
          echo "=================================="
          echo "$BODY"
          echo "=================================="
          
          if [ "$HTTP_STATUS" -ne 200 ]; then
            echo "Deployment webhook returned status $HTTP_STATUS. Deployment failed."
            exit 1
          fi
          
          echo "Deployment succeeded."
