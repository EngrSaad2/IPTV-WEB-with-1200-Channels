name: Deploy Website

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, iconv, mysqlnd

      - name: Install Composer Dependencies
        run: composer install --no-dev --prefer-dist --no-scripts --no-progress --no-interaction

      - name: Check SSH deployment secrets
        id: check_deploy_secrets
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          if [ -n "$SSH_PRIVATE_KEY" ] && [ -n "$SSH_HOST" ] && [ -n "$SSH_USER" ] && [ -n "$SSH_PORT" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy to Server via SSH/Rsync
        if: ${{ steps.check_deploy_secrets.outputs.ready == 'true' }}
        uses: easingthemes/ssh-deploy@v5.1.0
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          REMOTE_HOST: ${{ secrets.SSH_HOST }}
          REMOTE_USER: ${{ secrets.SSH_USER }}
          REMOTE_PORT: ${{ secrets.SSH_PORT }}
          TARGET: "/home/u263680919/domains/triangletech.com.bd/public_html/tv.triangletech.com.bd"
          SOURCE: "./"
          ARGS: "-rtlzO --delete"
          EXCLUDE: "/.git/, /.github/, /node_modules/, /tests/, .env, *.zip, /DB/"

      - name: Skip deploy when SSH secrets are missing
        if: ${{ steps.check_deploy_secrets.outputs.ready != 'true' }}
        run: echo "Skipping deploy because one or more SSH deployment secrets are not configured."
