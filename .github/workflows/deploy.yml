name: Deploy Website

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, iconv, mysqlnd

      - name: Install Composer Dependencies
        run: composer install --no-dev --prefer-dist --no-scripts --no-progress --no-interaction

      - name: Check SSH deployment secrets
        id: check_deploy_secrets
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          if [ -n "$SSH_PRIVATE_KEY" ] && [ -n "$SSH_HOST" ] && [ -n "$SSH_USER" ] && [ -n "$SSH_PORT" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy via SSH
        if: ${{ steps.check_deploy_secrets.outputs.ready == 'true' }}
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            cd /home/u263680919/domains/triangletech.com.bd/public_html/tv.triangletech.com.bd
            git fetch origin
            git reset --hard origin/main
            composer install --no-dev --optimize-autoloader --no-interaction


      - name: Skip deploy when SSH secrets are missing
        if: ${{ steps.check_deploy_secrets.outputs.ready != 'true' }}
        run: echo "Skipping deploy because one or more SSH deployment secrets are not configured."
